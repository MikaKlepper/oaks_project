# Base configuration for the OAKS Toxicology Pipeline

experiment_root: "outputs/MICCAI_experiments_benchmark_final/${datasets.name}/${aggregation.type}/${features.encoder}/${probe.type}/k${fewshot.k}"

data:
  project_root: "/data/temporary/mika/repos/oaks_project"
  data_root: "/data/temporary/mika/repos/oaks_project/splitting_data"
  organ: "Liver"

datasets:
  name: "tggates"        # canonical dataset key (tggates | ucb)
  use_subset: false
  split: "train"         # ["train", "val", "test"]
  subset_csv: null
  subset_fraction: null

features:
  encoder: "UNI"
  features_root: "/data/temporary/toxicology"   # true base anchor
  cache_root: "/data/temporary/mika/repos/oaks_project/pipeline/outputs/cache"

  feature_type: "animal"   # ["animal", "slide"]
  use_cache: false
  d_type: "float32"
  embed_dim: null

aggregation:
  type: "mean"

probe:
  type: "linear"
  hidden_dim: null
  num_layers: null
  knn_neighbors: 5

fewshot:
  k: null

runtime:
  num_workers: 0
  batch_size: 16
  epochs: 60
  lr: 1e-4

  optimizer: "adamw"
  weight_decay: 1e-4
  momentum: 0.9
  loss: "crossentropy"
  device: "cuda"
