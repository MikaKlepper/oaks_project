# Base configuration for the OAKS Toxicology Pipeline

#experiment_root: "outputs/MICCAI_final_experiments_benchmark_final/${datasets.name}/${data.target_task}/${aggregation.type}/${features.encoder}/${probe.type}/k${fewshot.k}/${experiment.tag}"
experiment_root: "outputs/first_test/${data.target_task}/${datasets.name}/${features.encoder}/${aggregation.type}/${probe.type}/k${fewshot.k}/${experiment.tag}"

data:
  project_root: "/data/temporary/mika/repos/oaks_project"
  data_root: "/data/temporary/mika/repos/oaks_project/splitting_data"
  organ: "Liver"
  metadata_csv: "/data/pa_cpgarchive/archives/toxicology/open-tg-gates/metadata_SD/open_tggates_master_list.csv"
  splits_dir: "/data/temporary/mika/repos/oaks_project/splitting_data/Splits/latest"

  # High-level prediction target. The concrete label source is inferred
  # automatically per dataset in utils/config_loader.py.
  target_task: "liver_hypertrophy"   # ["liver_hypertrophy", "any_abnormality"]

  # Resolved automatically. Keep null unless you want to override manually.
  target_mode: null
  target_finding: null
  target_column: null
  target_positive_value: null

datasets:
  name: "tggates"        # canonical dataset key (tggates | ucb)
  use_subset: false
  split: "train"         # ["train", "val", "test"]
  subset_csv: null
  subset_fraction: null

features:
  # Feature-bank only pipeline (legacy feature backend removed)
  backend: "feature_bank"
  encoder: "H_OPTIMUS_1"
  bank_root: "/data/temporary/mika/repos/oaks_project/feature_bank"
  # registry_path: "/tmp/features.sqlite"  # node-local; can disappear across jobs/nodes
  registry_path: "/data/temporary/mika/repos/oaks_project/feature_bank/registry/features.sqlite"
  local_bank_root: "/local/feature_bank"
  prefer_local_mirror: true

  feature_type: "animal"   # ["animal", "slide"]
  use_cache: false
  d_type: "float32"
  embed_dim: null

aggregation:
  type: "mean"

probe:
  type: "linear"
  hidden_dim: null
  num_layers: null
  knn_neighbors: 5

   # flow-specific params
  flow_input_dim: 32
  flow_layers: 8
  flow_hidden: 128

  # optional (but useful)
  flow_train_max_tiles: 5000
  flow_topk_frac: 0.4
  flow_tau_percentile: 95
  flow_pca_fit_max_tiles: 200000

fewshot:
  k: null

runtime:
  num_workers: 4
  batch_size: 16
  epochs: 60
  lr: 1e-4

  optimizer: "adamw"
  weight_decay: 1e-4
  momentum: 0.9
  loss: "crossentropy"
  device: "cuda"

splitting:
  num_repeats: 1000
  summary_csv: "/data/temporary/mika/repos/oaks_project/splitting_data/Splits/latest/split_summary.csv"
  generated_root: "outputs/generated_splits"

experiment:
  tag: "auto"

experiment_registry:
  path: "outputs/registry/experiment_runs.csv"

calibration:
  enabled: false
  base_dataset: "tggates"
  init_from_base: true
  num_samples: null
  source_csv: null
  seed: 42
